ignoreWorkspaceRootCheck: true

publicHoistPattern:
  - lefthook
  - eslint
  - '@commitlint/*'
  - czg
shellEmulator: true
trustPolicy: no-downgrade

packages:
  - playground
  - docs
  - packages/*

catalog:
  '@antfu/eslint-config': ^8.2.0
  '@changesets/changelog-github': ^0.7.0
  '@changesets/cli': ^2.31.0
  '@commitlint/cli': ^20.5.3
  '@commitlint/config-conventional': ^20.5.3
  '@iconify-json/svg-spinners': ^1.2.4
  '@shikijs/vitepress-twoslash': 3.13.0
  '@types/culori': ^4.0.1
  '@types/node': ^24.12.2
  '@types/qs': ^6.15.1
  '@unocss/reset': ^66.6.8
  '@vitest/coverage-v8': ^4.1.6
  '@vitest/ui': ^4.1.6
  '@vueuse/core': ^13.9.0
  chokidar: ^5.0.0
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  commitlint-plugin-function-rules: ^4.3.2
  culori: ^4.0.2
  cz-git: ^1.13.1
  czg: ^1.13.1
  date-fns: ^4.2.1
  eslint: ^10.4.0
  eslint-plugin-format: ^2.0.1
  fast-glob: ^3.3.3
  floating-vue: ^5.2.2
  lefthook: ^2.1.8
  mermaid: ^11.15.0
  pinia: ^3.0.4
  pnpm: ^11.1.3
  qs: ^6.15.2
  tailwind-merge: ^3.6.0
  tinyexec: ^1.1.2
  tsdown: ^0.22.0
  tsx: ^4.22.3
  turbo: ^2.9.14
  typescript: ^6.0.3
  unocss: ^66.6.8
  unplugin-vue-components: ^32.0.0
  vite: ^8.0.11
  vite-tsconfig-paths: ^5.1.4
  vitepress: 2.0.0-alpha.12
  vitepress-plugin-group-icons: ^1.7.5
  vitepress-plugin-mermaid: ^2.0.17
  vitest: ^4.1.6
  vitest-package-exports: ^1.2.0
  vue: ^3.5.34
  yaml: ^2.9.0

peerDependencyRules:
  allowedVersions:
    eslint: '*'

allowBuilds:
  esbuild: true
  lefthook: true
preferFrozenLockfile: true
autoInstallPeers: true
